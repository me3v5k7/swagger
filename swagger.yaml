# ==========================================
# COMPONENTS AND SCHEMAS DEFINITIONS SPEC
# ==========================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    rawPageSize:
      name: rawPageSize
      in: query
      schema:
        type: integer
        maximum: 40
        default: 8
    orderBy:
      name: orderBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, name, area, exhibitionDate]
        default: createdAt
    orderDir:
      name: orderDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    projectQuery:
      name: project
      in: query
      required: true
      schema:
        type: integer
    companyEntityQuery:
      name: companyEntity
      in: query
      required: true
      schema:
        type: integer

  schemas:
    # Enums Definition Maps
    ProjectStatus:
      type: string
      enum:
        - WAITING_FOR_CONTACT
        - INITIAL_NEGOTIATIONS
        - TECHNICAL_REQUIREMENTS_FORMED
        - DESIGN_APPROVED
        - ESTIMATE_APPROVED
        - CONTRACT_SIGNED
        - BLUEPRINTS_READY
        - MATERIALS_ORDERED
        - MATERIALS_RECEIVED
        - INSTALLATION_IN_PROGRESS
        - STAND_DELIVERED
        - PAYMENTS_CLOSED
        - CANCELLED
        - NOT_PARTICIPATING

    ProjectCategory:
      type: string
      enum:
        - EXCLUSIVE
        - STANDART
        - PIDVIS

    CompanyEntityType:
      type: string
      enum:
        - SUPPLIER
        - EXHIBITION_CENTER
        - CLIENT

    ClientType:
      type: string
      enum:
        - PUBLIC
        - PRIVATE

    # Core Payload Objects Mappings
    EnumItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        token:
          type: string
          format: uuid

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        r2Key:
          type: string
        avatarImageUrl:
          type: string
        deleted:
          type: boolean

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        area:
          type: string
        category:
          $ref: '#/components/schemas/ProjectCategory'
        status:
          $ref: '#/components/schemas/ProjectStatus'
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        totalBudget:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - name
        - manager
        - category
        - status
        - client
        - exhibition
      properties:
        name:
          type: string
        manager:
          type: integer
        area:
          type: string
        category:
          $ref: '#/components/schemas/ProjectCategory'
        status:
          $ref: '#/components/schemas/ProjectStatus'
        client:
          type: integer
        exhibition:
          type: integer

    PatchProjectRequest:
      type: object
      properties:
        name:
          type: string
        manager:
          type: integer
        area:
          type: string
        category:
          $ref: '#/components/schemas/ProjectCategory'
        status:
          $ref: '#/components/schemas/ProjectStatus'
        client:
          type: integer
        exhibition:
          type: integer

    BudgetLedgerPayload:
      type: object
      required:
        - amount
        - currency
        - exchangeRate
      properties:
        amount:
          type: string
        currency:
          type: string
        exchangeRate:
          type: string

    ProjectBudget:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: string
        currency:
          type: string
        exchangeRate:
          type: string

    CommentPayload:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string

    CreateProjectSupplierPayload:
      type: object
      required:
        - amount
        - currency
        - exchangeRate
        - supplier
      properties:
        amount:
          type: string
        currency:
          type: string
        exchangeRate:
          type: string
        comment:
          type: string
          default: ""
        supplier:
          type: integer

    UpdateProjectSupplierPayload:
      type: object
      required:
        - amount
        - currency
        - exchangeRate
        - comment
      properties:
        amount:
          type: string
        currency:
          type: string
        exchangeRate:
          type: string
        comment:
          type: string
          default: ""

    CreateClientPayload:
      type: object
      required:
        - name
        - description
        - phoneNumber
        - email
        - website
        - manager
        - clientType
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer
        clientType:
          $ref: '#/components/schemas/ClientType'

    PatchClientPayload:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer
        clientType:
          $ref: '#/components/schemas/ClientType'

    CreateExhibitionCenterPayload:
      type: object
      required:
        - name
        - description
        - phoneNumber
        - email
        - website
        - manager
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer

    PatchExhibitionCenterPayload:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer

    CreateSupplierPayload:
      type: object
      required:
        - name
        - description
        - phoneNumber
        - email
        - website
        - manager
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer
        tags:
          type: array
          items:
            type: integer

    PatchSupplierPayload:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        website:
          type: string
        manager:
          type: integer
        tags:
          type: array
          items:
            type: integer

    UpdateSupplierTagsPayload:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            type: integer

    CreateTagsPayload:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            type: string

    UpdateTagLabelPayload:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    CompanyDetailsPayload:
      type: object
      required:
        - name
        - address
        - paymentDetails
        - comment
      properties:
        name:
          type: string
        address:
          type: string
        paymentDetails:
          type: string
        comment:
          type: string

    AddressPayload:
      type: object
      required:
        - country
        - city
        - address
        - googleMapsLink
        - comment
      properties:
        country:
          type: string
        city:
          type: string
        address:
          type: string
        googleMapsLink:
          type: string
        comment:
          type: string

    ContactPersonPayload:
      type: object
      required:
        - name
        - position
        - phoneNumbers
        - emails
      properties:
        name:
          type: string
        position:
          type: string
        phoneNumbers:
          type: array
          items:
            type: object
            required:
              - phoneNumber
              - comment
            properties:
              phoneNumber:
                type: string
              comment:
                type: string
        emails:
          type: array
          items:
            type: object
            required:
              - email
              - comment
            properties:
              email:
                type: string
              comment:
                type: string

    ExhibitionPayload:
      type: object
      required:
        - shortName
        - dates
        - exhibitionTheme
      properties:
        shortName:
          type: string
        longName:
          type: string
          default: ""
        dates:
          type: object
          required:
            - exhibitionStart
            - exhibitionEnd
          properties:
            addConStart:
              type: string
              format: date-time
              nullable: true
            conStart:
              type: string
              format: date-time
              nullable: true
            client:
              type: string
              format: date-time
              nullable: true
            exhibitionStart:
              type: string
              format: date-time
            exhibitionEnd:
              type: string
              format: date-time
            deconEnd:
              type: string
              format: date-time
              nullable: true
            addDeconEnd:
              type: string
              format: date-time
              nullable: true
        exhibitionTheme:
          type: integer
        projects:
          type: array
          items:
            type: integer
        exhibitionCenters:
          type: array
          items:
            type: integer
        organiser:
          type: integer

    ExhibitionThemePayload:
      type: object
      required:
        - name
        - organiser
      properties:
        name:
          type: string
        organiser:
          type: integer
        exhibitions:
          type: array
          items:
            type: integer

    TransformedExhibition:
      type: object
      properties:
        exhibition:
          type: object
          description: Exhibition schema detail excluding base lazy child project relationships lists components elements
        projectTypes:
          type: object
          additionalProperties:
            type: object
            properties:
              counter:
                $ref: '#/components/schemas/DashboardCounter'
              managers:
                type: array
                items:
                  type: object
                  properties:
                    manager:
                      $ref: '#/components/schemas/User'
                    counter:
                      $ref: '#/components/schemas/DashboardCounter'
                    projects:
                      type: array
                      items:
                        $ref: '#/components/schemas/Project'

    DashboardCounter:
      type: object
      properties:
        awaitingContract:
          type: integer
        inProgress:
          type: integer
        finished:
          type: integer
        canceled:
          type: integer
