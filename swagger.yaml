openapi: 3.0.3
info:
  title: Standpoint Backend API
  description: Complete OpenAPI documentation generated from the application routing, Zod payload validation layer, and MikroORM database entity constraints.
  version: 1.0.0
servers:
  - url: http://localhost:4000
    description: Local Development Server

security:
  - bearerAuth: []

paths:
  # ==========================================
  # AUTHENTICATION
  # ==========================================
  /auth/login:
    post:
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          description: Invalid email or password credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: User Logout
      responses:
        '204':
          description: Logged out successfully, token tracking destroyed
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          description: Context tracking exception (login token missing on request scope)

  /auth/user_info:
    get:
      summary: Get Profile Info for Authenticated User
      responses:
        '200':
          description: Active user account data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthorized'

  # ==========================================
  # DASHBOARD PAGES
  # ==========================================
  /page/main:
    get:
      summary: Fetch Main Dashboard Metric Layouts
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Metric profile matrix matching selected dates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransformedExhibition'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'

  # ==========================================
  # PROJECTS RESOURCE
  # ==========================================
  /project/enum:
    get:
      summary: Simple Id/Name Key Index of All Projects
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdNameEnumItem'

  /project/:
    post:
      summary: Create Project Record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/400BadRequest'

  /project/all:
    get:
      summary: Retrieve Paginated List of Projects
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: minArea
          in: query
          schema:
            type: string
        - name: maxArea
          in: query
          schema:
            type: string
        - name: minBudget
          in: query
          schema:
            type: string
        - name: maxBudget
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ProjectCategory'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: client
          in: query
          schema:
            type: integer
        - name: exhibition
          in: query
          schema:
            type: integer
        - name: supplier
          in: query
          schema:
            type: integer
        - name: exhibitionDateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: exhibitionDateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  totalPages:
                    type: integer

  /project/{id}:
    get:
      summary: Find Single Project Profile by Id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/404NotFound'
    patch:
      summary: Modify targeted attributes of an existing project
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Soft-Delete Project Entry
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Soft-delete state modified successfully
        '404':
          $ref: '#/components/responses/404NotFound'

  # =/project/budget/
  /project/budget/:
    post:
      summary: Create Project Budget Item
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBudget'

  /project/budget/{id}:
    patch:
      summary: Modify Project Budget Reference
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBudget'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Hard-Delete Project Budget Record
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Purged from tracking infrastructure

  # =/project/comment/
  /project/comment/:
    post:
      summary: Post New Project Feedback Comment
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectComment'

  /project/comment/{id}:
    put:
      summary: Update project commentary string text
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectComment'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Soft-Delete Project Comment Entry
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Flagged deleted state changed successfully

  # =/project/supplier/
  /project/supplier/:
    post:
      summary: Allocate External Cost Supplier to Project Pipeline
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectSupplierPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectToSupplier'

  /project/supplier/{id}:
    patch:
      summary: Modify Allocation Variables of a Project Supplier Connection
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectSupplierPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectToSupplier'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Hard-Delete Project Supplier Link Mapping
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Entity record unlinked and dropped

  # =/project/image
  /project/{id}/image:
    post:
      summary: Upload Asset Graphics Batch for Project Tracking Array
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  maxItems: 10
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Multi-part payload binary resolved and saved to object storage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectImage'
        '400':
          description: File limit verification failed or images formatted incorrectly

  /project/image/{id}:
    delete:
      summary: Remove Cloudflare R2 Asset Key Object and drops Database Track
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Resource object storage file and mapping purged

  # ==========================================
  # CLIENT MANAGEMENT
  # ==========================================
  /client/enum:
    get:
      summary: Fetch Simple Key List of All Tracking Clients
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdNameEnumItem'

  /client/all:
    get:
      summary: Retrieve Paginated List of Corporate Profiles Registered under Client Scope
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: anyExhibition
          in: query
          schema:
            type: integer
        - name: clientType
          in: query
          schema:
            $ref: '#/components/schemas/ClientType'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientCE'
                  totalPages:
                    type: integer

  /client/:
    post:
      summary: Create Client Record Entity Type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCE'

  /client/{id}:
    get:
      summary: Find Deep Populated Details of Unique Client Record Group
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCE'
        '404':
          $ref: '#/components/responses/404NotFound'
    patch:
      summary: Partial Attribute Mutation of Selective Client Record Rows
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchClientRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCE'
    delete:
      summary: Apply Soft-Delete Flags across Selected Account Profiles
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Flag updated successfully

  # ==========================================
  # EXHIBITION CENTERS
  # ==========================================
  /exhibition_center/enum:
    get:
      summary: Simple Enumerated Name Map of Exhibition Centers
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdNameEnumItem'

  /exhibition_center/all:
    get:
      summary: Query Paginated Exhibition Center Rows
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExhibitionCenterCE'
                  totalPages:
                    type: integer

  /exhibition_center/:
    post:
      summary: Register Unique Exhibition Grounds/Facility Center Track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExhibitionCenterPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionCenterCE'

  /exhibition_center/{id}:
    get:
      summary: Detailed Facility Specifications View
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionCenterCE'
    patch:
      summary: Partial Profile Corrections
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchExhibitionCenterPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionCenterCE'
    delete:
      summary: Soft-Delete Selected Location Centers
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Dropped active status visibility

  # ==========================================
  # SUPPLIERS & TAGS
  # ==========================================
  /supplier/enum:
    get:
      summary: Fetch Indexed List of Active Providers
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdNameEnumItem'

  /supplier/all:
    get:
      summary: Fetch Paginated List of Third-Party Contractors/Suppliers
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: tags
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupplierCE'
                  totalPages:
                    type: integer

  /supplier/:
    post:
      summary: Register Supplier Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplierPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierCE'

  /supplier/{id}:
    get:
      summary: Fetch Deep Component View of Designated Subcontractor Entry
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierCE'
    patch:
      summary: Modify Assigned Account Fields for a Supplier Provider
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSupplierPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierCE'
    delete:
      summary: Soft-Delete Supplier Track Profile
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Flagged matching index state variables to true

  /supplier/{id}/tags:
    put:
      summary: Overwrite and Map Specific Array Track of Taxonomy Tags onto Supplier Profile
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSupplierTagsPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierCE'

  /supplier/tag/all:
    get:
      summary: Get alphabetized index layout of all tags
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierTag'

  /supplier/tag:
    post:
      summary: Batch Generate Unique Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagsPayload'
      responses:
        '200':
          description: Executed safe checks and resolved matches array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagResult'

  /supplier/tag/{id}:
    put:
      summary: Rename Taxonomy Tag Entry
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierTag'
        '409':
          description: Unique string index name collision found
    delete:
      summary: Remove Taxonomy Tag
      parameters:
        - $ref: '#/components/parameters/id'
        - name: force
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Hard deleted matching taxonomy key
        '409':
          description: Attempt to delete key referenced elsewhere without explicitly toggling force parameters query parameter to true

  # ==========================================
  # COMPANY ASSOCIATED ENTITY SUB-COMPONENTS
  # ==========================================
  /company_entity/details:
    post:
      summary: Bind Bank Payment Terms / Corporate Profile Data Details onto Parent Company Entity
      parameters:
        - name: companyEntity
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyDetailsPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDetails'

  /company_entity/details/{id}:
    get:
      summary: Get Financial Details Profile Model Object
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDetails'
    put:
      summary: Overwrite Details Properties Layer
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyDetailsPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDetails'
    delete:
      summary: Hard-Purge Account Corporate/Bank Data Rows Detail Index
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Target row data deleted

  /company_entity/address/:
    post:
      summary: Register Location Maps Address Row connected onto Core Company Profile
      parameters:
        - name: companyEntity
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'

  /company_entity/address/{id}:
    get:
      summary: Fetch Location Coordinates
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
    put:
      summary: Full Parameter Payload Address Object Overwrite
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
    delete:
      summary: Hard Delete Location Tracking Mapping Record Row
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Dropped address track tracking lines

  /company_entity/contact_person/:
    post:
      summary: Assign Representative Agent Contact Profile onto Company Account Record
      parameters:
        - name: companyEntity
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactPersonPayload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactPerson'

  /company_entity/contact_person/{id}:
    get:
      summary: Fetch Targeted Agent Identity Details
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactPerson'
    put:
      summary: Full Payload Update of Contact Records
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactPersonPayload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactPerson'
    delete:
      summary: Hard Delete Representative Profile mapping completely
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Contact person profile dropped

  /company_entity/{id}/logo/:
    post:
      summary: Process and Assign Single Graphic Logo image on designated Company Profile Record
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Binary mapped, old Cloudflare R2 graphics asset cleaned up, entity tracking strings flushed

  # ==========================================
  # EXHIBITIONS MANAGEMENT
  # ==========================================
  /exhibition/enum:
    get:
      summary: Enumerate Essential Identifiers for All Exhibitions
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    shortName:
                      type: string
                    longName:
                      type: string

  /exhibition/all:
    get:
      summary: Query Paginated Timeline of Exhibitions
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: exhibitionTheme
