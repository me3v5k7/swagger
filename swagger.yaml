        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: tags
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Search output response arrays
  /supplier/:
