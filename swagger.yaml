          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: anyExhibition
          in: query
          schema:
            type: integer
        - name: clientType
          in: query
          schema:
            $ref: '#/components/schemas/ClientType'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
  /client/:
    post:
      summary: Provision structural profile wrapper context detailing structural business entity metadata profiles
      tags:
        - Client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientPayload'
      responses:
        '201':
          description: Provisioned
  /client/{id}:
    get:
      summary: Deep populated lookups against operational profiles
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Success
    patch:
      summary: Update general client company demographics details fields
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchClientPayload'
      responses:
        '200':
          description: Mutated
    delete:
      summary: System execution context for triggering client visibility toggles (Soft-Delete)
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Suspended

