components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    rawPageSize:
      name: rawPageSize
      in: query
      schema:
        type: integer
        maximum: 40
        default: 8
    orderBy:
      name: orderBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, name, area, exhibitionDate]
        default: createdAt
    orderDir:
      name: orderDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  responses:
    400BadRequest:
      description: Bad Parameter Arguments / Zod Schema Payload Execution Throw Violation / DB ForeignKey Contraint Exception
      headers:
        x-request-id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    401Unauthorized:
      description: Authentication Context Verification Throw Exception, Token Mismatch/Missing or Expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404NotFound:
      description: Record Database Reference query returned zero rows match
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ==========================================
  # ENUMS, PAYLOADS & ENTITY SCHEMAS
  # ==========================================
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string

    IdNameEnumItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProjectStatus:
      type: string
      enum:
        - WAITING_FOR_CONTACT
        - INITIAL_NEGOTIATIONS
        - TECHNICAL_REQUIREMENTS_FORMED
        - DESIGN_APPROVED
        - ESTIMATE_APPROVED
        - CONTRACT_SIGNED
        - BLUEPRINTS_READY
        - MATERIALS_ORDERED
        - MATERIALS_RECEIVED
        - INSTALLATION_IN_PROGRESS
        - STAND_DELIVERED
        - PAYMENTS_CLOSED
        - CANCELLED
        - NOT_PARTICIPATING

    ProjectCategory:
      type: string
      enum: [EXCLUSIVE, STANDART, PIDVIS]

    CompanyEntityType:
      type: string
      enum: [SUPPLIER, EXHIBITION_CENTER, CLIENT]

    ClientType:
      type: string
      enum: [PUBLIC, PRIVATE]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        token:
          type: string
          format: uuid

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        r2Key:
          type: string
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        avatarImageUrl:
          type: string

    TransformedExhibition:
      type: object
      properties:
        exhibition:
          type: object
          description: Exhibition object properties without embedded metrics array reference mapping.
        projectTypes:
          type: object
          additionalProperties:
            type: object
            properties:
              counter:
                $ref: '#/components/schemas/MetricsCounter'
              managers:
                type: array
                items:
                  type: object
                  properties:
                    manager:
                      $ref: '#/components/schemas/User'
                    counter:
                      $ref: '#/components/schemas/MetricsCounter'
                    projects:
                      type: array
                      items:
                        $ref: '#/components/schemas/Project'

    MetricsCounter:
      type: object
      properties:
        awaitingContract:
          type: integer
        inProgress:
          type: integer
        finished:
          type: integer
        canceled:
          type: integer

    Project:
