openapi: 3.0.3
info:
  title: Standpoint Backend API
  version: 1.0.0
  description: API documentation for the Standpoint architecture and project management backend system.
servers:
  - url: http://localhost:4000
    description: Local development server

paths:
  # ==========================================
  # AUTHENTICATION
  # ==========================================
  /auth/login:
    post:
      summary: User Login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '400':
          description: Validation error

  /auth/logout:
    post:
      summary: User Logout
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /auth/user_info:
    get:
      summary: Get current user info
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ==========================================
  # PAGE
  # ==========================================
  /page/main:
    get:
      summary: Fetch main dashboard page data filtered by date overlap
      tags:
        - Page
      security:
        - bearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Array of transformed exhibition and project dashboard data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransformedExhibition'

  # ==========================================
  # PROJECTS
  # ==========================================
  /project/enum:
    get:
      summary: List all projects with simple name and id mapping
      tags:
        - Project
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnumItem'

  /project/:
    post:
      summary: Create a new project
      tags:
        - Project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /project/all:
    get:
      summary: List and search all projects with pagination
      tags:
        - Project
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/rawPageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/orderDir'
        - name: name
          in: query
          schema:
            type: string
        - name: manager
          in: query
          schema:
            type: integer
        - name: minArea
          in: query
          schema:
            type: string
        - name: maxArea
          in: query
          schema:
            type: string
        - name: minBudget
          in: query
          schema:
            type: string
        - name: maxBudget
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ProjectCategory'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: client
          in: query
          schema:
            type: integer
        - name: exhibition
          in: query
          schema:
            type: integer
        - name: supplier
          in: query
          schema:
            type: integer
        - name: exhibitionDateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: exhibitionDateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of paginated projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  totalPages:
                    type: integer

  /project/{id}:
    get:
      summary: Get details of a single project
      tags:
        - Project
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Project information populated with deep associations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
    patch:
      summary: Update metadata details on an existing project
      tags:
        - Project
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
    delete:
      summary: Soft-delete a project
      tags:
        - Project
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Project marked as deleted
        '404':
          description: Project not found

  # Project Budget Child Routing
  /project/budget/:
    post:
      summary: Create a target allocation record in project budget ledger
      tags:
        - Project Budget
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetLedgerPayload'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBudget'
  /project/budget/{id}:
    patch:
      summary: Update an amount record in budget allocation ledger
      tags:
        - Project Budget
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetLedgerPayload'
      responses:
        '200':
          description: Success
    delete:
      summary: Hard delete a project budget tracking line
      tags:
        - Project Budget
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Removed

  # Project Comments Child Routing
  /project/comment/:
    post:
      summary: Add structural feedback comments against project tracker
      tags:
        - Project Comment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentPayload'
      responses:
        '201':
          description: Saved
  /project/comment/{id}:
    put:
      summary: Rewrite existing project text commentary
      tags:
        - Project Comment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentPayload'
      responses:
        '200':
          description: Updated
    delete:
      summary: Soft-delete comment from client visibility
      tags:
        - Project Comment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Removed

  # Project Suppliers Tracking Child Routing
  /project/supplier/:
    post:
      summary: Bind external processing supplier contract amounts to Project
      tags:
        - Project Supplier
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectSupplierPayload'
      responses:
        '201':
          description: Associated
  /project/supplier/{id}:
    patch:
      summary: Mutate pricing on active supplier links inside project
      tags:
        - Project Supplier
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectSupplierPayload'
      responses:
        '200':
          description: Flushed
    delete:
      summary: Hard remove a linked supplier pipeline from the structural project layout
      tags:
        - Project Supplier
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Decoupled

  # Project Images Upload Multi
  /project/{id}/image:
    post:
      summary: Upload array of images for production reference to S3/R2 storage tier
      tags:
        - Project Image
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  maxItems: 10
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Upload context complete
  /project/image/{id}:
    delete:
      summary: Unlink object from tracking map and wipe physical content off R2 cluster storage file index
      tags:
        - Project Image
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Purged

  # ==========================================
  # CLIENTS
  # ==========================================
  /client/enum:
    get:
      summary: List all client companies (Simple Enum)
      tags:
