      responses:
        '200':
          description: Complete domain parameters maps returns
    patch:
      summary: Structural field mutation against site data metrics details indexes
      tags:
        - Exhibition Center
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchExhibitionCenterPayload'
      responses:
        '200':
          description: Profile records adjusted
    delete:
      summary: Flag infrastructure entry point as soft disabled within downstream tracking metrics view layers
      tags:
        - Exhibition Center
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
